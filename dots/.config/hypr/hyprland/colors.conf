general {
    col.active_border = rgba(78768077)
    col.inactive_border = rgba(c8c5d055)
}

misc {
    background_color = rgba(131318FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(fcf8ffFF)
        col.text = rgba(1b1b21FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(1b1b21), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(1b1b21), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(1b1b21), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(5a5892AA) rgba(5a589277), match:pin 1
